name: Refresh Market Data and Deploy

on:
  schedule:
    # Every 30 minutes during market hours (14:30-21:00 UTC, Mon-Fri)
    - cron: '*/30 14-21 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  refresh-build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install data dependencies
        run: pip install -r requirements-data.txt

      - name: Fetch latest data
        run: python scripts/update_data.py

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Commit refreshed data if changed
        run: |
          git config user.name "Robofutures Bot"
          git config user.email "bot@robofutures.github.io"
          git add public/data/quotes.json public/data/history.json
          if ! git diff --cached --quiet; then
            git commit -m "data: market refresh $(date -u +%Y-%m-%dT%H:%M)Z"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Build static site
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - id: deployment
        uses: actions/deploy-pages@v4
