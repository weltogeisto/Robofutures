name: Refresh Market Data

on:
  schedule:
    # Every 30 minutes during market hours (14:30-21:00 UTC, Mon-Fri)
    - cron: '*/30 14-21 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yfinance
        run: pip install yfinance

      - name: Fetch latest data
        run: python scripts/update_data.py

      - name: Commit & push if changed
        run: |
          git config user.name "Robofutures Bot"
          git config user.email "bot@robofutures.github.io"
          git add public/data/quotes.json public/data/history.json
          if ! git diff --cached --quiet; then
            git commit -m "data: market refresh $(date -u +%Y-%m-%dT%H:%M)Z"
            git push
          else
            echo "No changes to commit"
          fi
